services:
  # ─── Banco de dados ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-korp_postgres}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-korp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-korp}
      POSTGRES_DB: ${POSTGRES_DB:-korp}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      # Persiste os dados entre restarts do container
      - postgres_data:/var/lib/postgresql/data
      # Roda as migrations automaticamente na primeira inicialização
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-korp} -d ${POSTGRES_DB:-korp}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - korp_network

  # ─── Serviço de Estoque ──────────────────────────────────────────────────────
  estoque:
    build:
      context: ./services/estoque
      dockerfile: Dockerfile
    container_name: ${ESTOQUE_CONTAINER_NAME:-korp_estoque}
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-korp}:${POSTGRES_PASSWORD:-korp}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${POSTGRES_DB:-korp}?sslmode=${DB_SSLMODE:-disable}
      PORT: ${ESTOQUE_PORT:-8080}
    ports:
      - "${ESTOQUE_HOST_PORT:-8080}:${ESTOQUE_PORT:-8080}"
    # Só sobe depois que o postgres estiver saudável
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - korp_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${ESTOQUE_PORT:-8080}/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Serviço de Faturamento ──────────────────────────────────────────────────
  faturamento:
    build:
      context: ./services/faturamento
      dockerfile: Dockerfile
    container_name: ${FATURAMENTO_CONTAINER_NAME:-korp_faturamento}
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-korp}:${POSTGRES_PASSWORD:-korp}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${POSTGRES_DB:-korp}?sslmode=${DB_SSLMODE:-disable}
      PORT: ${FATURAMENTO_PORT:-8081}
      # Usa o nome do container como host — o Docker resolve internamente
      ESTOQUE_SERVICE_URL: http://estoque:${ESTOQUE_PORT:-8080}
    ports:
      - "${FATURAMENTO_HOST_PORT:-8081}:${FATURAMENTO_PORT:-8081}"
    # Faturamento depende do estoque pois faz chamadas HTTP para ele
    depends_on:
      postgres:
        condition: service_healthy
      estoque:
        condition: service_healthy
    networks:
      - korp_network

  # ─── Frontend (opcional) ────────────────────────────────────────────────────
  frontend:
    image: node:${FRONTEND_NODE_IMAGE_TAG:-22-alpine}
    container_name: ${FRONTEND_CONTAINER_NAME:-korp_frontend}
    working_dir: /app
    profiles:
      - frontend
    environment:
      CHOKIDAR_USEPOLLING: "${FRONTEND_CHOKIDAR_USEPOLLING:-true}"
    command: >
      sh -c "npm ci && npm run start -- --host 0.0.0.0 --port ${FRONTEND_PORT:-4200}"
    ports:
      - "${FRONTEND_HOST_PORT:-4200}:${FRONTEND_PORT:-4200}"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      estoque:
        condition: service_healthy
      faturamento:
        condition: service_started
    networks:
      - korp_network

volumes:
  postgres_data:
  frontend_node_modules:

networks:
  korp_network:
    driver: bridge
