services:
  # ─── Banco de dados ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: korp_postgres
    environment:
      POSTGRES_USER: korp
      POSTGRES_PASSWORD: korp
      POSTGRES_DB: korp
    ports:
      - "5433:5432"
    volumes:
      # Persiste os dados entre restarts do container
      - postgres_data:/var/lib/postgresql/data
      # Roda as migrations automaticamente na primeira inicialização
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U korp -d korp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - korp_network

  # ─── Serviço de Estoque ──────────────────────────────────────────────────────
  estoque:
    build:
      context: ./services/estoque
      dockerfile: Dockerfile
    container_name: korp_estoque
    environment:
      DATABASE_URL: postgres://korp:korp@postgres:5432/korp?sslmode=disable
      PORT: 8080
    ports:
      - "8080:8080"
    # Só sobe depois que o postgres estiver saudável
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - korp_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Serviço de Faturamento ──────────────────────────────────────────────────
  faturamento:
    build:
      context: ./services/faturamento
      dockerfile: Dockerfile
    container_name: korp_faturamento
    environment:
      DATABASE_URL: postgres://korp:korp@postgres:5432/korp?sslmode=disable
      PORT: 8081
      # Usa o nome do container como host — o Docker resolve internamente
      ESTOQUE_SERVICE_URL: http://estoque:8080
    ports:
      - "8081:8081"
    # Faturamento depende do estoque pois faz chamadas HTTP para ele
    depends_on:
      postgres:
        condition: service_healthy
      estoque:
        condition: service_healthy
    networks:
      - korp_network

volumes:
  postgres_data:

networks:
  korp_network:
    driver: bridge
