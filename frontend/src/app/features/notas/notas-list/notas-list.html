<div class="page-header">
  <h1 class="page-title">Notas Fiscais</h1>
  <button mat-raised-button color="primary" (click)="novaNota()" [disabled]="carregando">
    <mat-icon>add</mat-icon>
    Nova Nota
  </button>
</div>

<mat-card>
  <mat-card-content>
    @if (carregando) {
    <app-loading-spinner [visivel]="carregando" mensagem="Carregando notas..." />
    } @else if (notas.length === 0) {
    <div class="empty-state">
      <mat-icon>receipt_long</mat-icon>
      <p>Nenhuma nota fiscal emitida.</p>
      <button mat-stroked-button color="primary" (click)="novaNota()">Criar primeira nota</button>
    </div>
    } @else {
    <table mat-table [dataSource]="notas" class="tabela">
      <ng-container matColumnDef="num_seq">
        <th mat-header-cell *matHeaderCellDef>Número</th>
        <td mat-cell *matCellDef="let nota">
          <strong># {{ nota.num_seq }}</strong>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let nota">
          <mat-chip [class]="nota.status === 'ABERTA' ? 'chip-aberta' : 'chip-fechada'">
            {{ nota.status }}
          </mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let nota">
          <button mat-icon-button (click)="verDetalhe(nota.id)">
            <mat-icon>chevron_right</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: colunas;"
        class="linha-clicavel"
        (click)="verDetalhe(row.id)"
      ></tr>
    </table>
    }
  </mat-card-content>
</mat-card>
