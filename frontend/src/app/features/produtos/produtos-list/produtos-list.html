<div class="page-header">
  <h1 class="page-title">Produtos</h1>
  <button mat-raised-button color="primary" (click)="novoProduto()">
    <mat-icon>add</mat-icon>
    Novo Produto
  </button>
</div>

<mat-card>
  <mat-card-content>
    @if (carregando) {
    <app-loading-spinner [visivel]="carregando" mensagem="Carregando produtos..." />
    } @else if (produtos.length === 0) {
    <div class="empty-state">
      <mat-icon>inventory_2</mat-icon>
      <p>Nenhum produto cadastrado.</p>
      <button mat-stroked-button color="primary" (click)="novoProduto()">
        Cadastrar primeiro produto
      </button>
    </div>
    } @else {
    <table mat-table [dataSource]="produtos" class="tabela">
      <ng-container matColumnDef="codigo">
        <th mat-header-cell *matHeaderCellDef>Codigo</th>
        <td mat-cell *matCellDef="let produto">
          <strong>{{ produto.codigo }}</strong>
        </td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let produto">{{ produto.nome }}</td>
      </ng-container>

      <ng-container matColumnDef="saldo">
        <th mat-header-cell *matHeaderCellDef>Saldo em Estoque</th>
        <td mat-cell *matCellDef="let produto">
          <span [class]="produto.saldo === 0 ? 'saldo-zerado' : 'saldo-ok'">
            {{ produto.saldo }} un.
          </span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
    </table>
    }
  </mat-card-content>
</mat-card>
